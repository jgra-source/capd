<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
  <title>Capd</title>
</head>
<body>
  <div class="app">
    <header class="head">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56" />
            <polyline points="12 7 12 12 15.5 13.8" />
          </svg>
        </span>
        <div class="brand-text">
          <span class="wordmark">Capd</span>
          <span class="eyebrow">Claude usage</span>
        </div>
      </div>
      <div class="status" id="status">
        <span class="dot" id="status-dot"></span>
        <span class="status-text" id="status-text">—</span>
      </div>
    </header>

    <main id="main">
      <!-- rendered by popup.js -->
    </main>

    <section class="settings" id="settings">
      <button class="settings-toggle" id="settings-toggle" aria-expanded="false">
        <span class="st-left">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
          Settings
        </span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9" /></svg>
      </button>

      <div class="settings-body" id="settings-body" hidden>
        <label class="field">
          <span class="field-label">Alert threshold</span>
          <span class="field-row">
            <input type="range" id="threshold" min="50" max="100" step="5" />
            <output class="field-val mono" id="threshold-val">80%</output>
          </span>
        </label>

        <label class="field field-inline">
          <span class="field-label">Near-cap notifications</span>
          <input type="checkbox" id="notifications" class="switch" />
        </label>

        <label class="field">
          <span class="field-label">Badge shows</span>
          <select id="badge-metric" class="select">
            <option value="max">Highest cap</option>
            <option value="session">Session (5h)</option>
            <option value="weekly">Weekly</option>
          </select>
        </label>

        <div class="settings-actions">
          <button class="btn" id="open-claude">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
              <polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" />
            </svg>
            Open claude.ai
          </button>
          <button class="btn btn-ghost" id="clear-history">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
            Clear history
          </button>
        </div>
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
